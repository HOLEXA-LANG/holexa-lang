name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install GCC
        run: sudo apt-get install -y gcc make
      
      - name: Build compiler
        run: |
          cd compiler
          make
      
      - name: Run tests
        run: |
          cd compiler
          ./hlxc run ../examples/hello.hlx
          ./hlxc run ../examples/fibonacci.hlx
          ./hlxc run ../examples/calculator.hlx
      
      - name: Check version
        run: ./compiler/hlxc version
